<!DOCTYPE html>
<html>

<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    background:linear-gradient(135deg,#6366f1,#3b82f6);
}

.login-box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:350px;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.password-wrapper {
    position: relative;
}

.password-wrapper input {
    padding-right: 40px;
}

.password-wrapper span {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
}
</style>

</head>

<body>

<div class="login-box">

<h3 class="text-center mb-4">Attendance System</h3>

<form method="POST">

<input name="email" class="form-control mb-3" placeholder="Email">

<div class="password-wrapper">
    <input type="password" id="password" name="password" class="form-control mb-3" placeholder="Password" required>

    <span id="eyeIcon" onclick="togglePassword()">👁</span>
</div>

<button class="btn btn-primary w-100">Login</button>

</form>

</div>

<script>
function togglePassword() {
    const passwordField = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");

    if (passwordField.type === "password") {
        passwordField.type = "text";
        eyeIcon.textContent = "🙈";
    } else {
        passwordField.type = "password";
        eyeIcon.textContent = "👁";
    }
}
</script>

</body>

</html>
