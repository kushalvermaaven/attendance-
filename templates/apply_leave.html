<h2>Apply Leave</h2>

<form method="POST">

<label>Start Date</label>
<input type="date" name="start_date" required>

<label>End Date</label>
<input type="date" name="end_date" required>

<label>Reason</label>
<textarea name="reason" required></textarea>

<button type="submit">Submit Leave</button>

</form>
