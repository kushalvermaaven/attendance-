<h2>Leave Requests</h2>

<table border="1">

<tr>
<th>Employee</th>
<th>Start</th>
<th>End</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for r in requests %}

<tr>

<td>{{r.name}}</td>
<td>{{r.start_date}}</td>
<td>{{r.end_date}}</td>
<td>{{r.reason}}</td>
<td>{{r.status}}</td>

<td>

<a href="/approve_leave/{{r.id}}">Approve</a>

<a href="/reject_leave/{{r.id}}">Reject</a>

</td>

</tr>

{% endfor %}

</table>
