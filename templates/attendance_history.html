{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Attendance History</h2>

<div class="table-container">

<table class="table table-striped">

<thead>
<tr>
<th>Date</th>
<th>Check In</th>
<th>Check Out</th>
<th>Status</th>
</tr>
</thead>

<tbody>

{% for a in data %}

<tr>

<td>{{a.date}}</td>
<td>{{a.check_in_time}}</td>
<td>
{% if a.check_out_time %}
{{a.check_out_time}}
{% else %}
-
{% endif %}
</td>
<td>{{a.status}}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
